# release-plz configuration
# Docs: https://release-plz.dev/docs/config

[workspace]
# Generate / update CHANGELOG.md from conventional commits.
changelog_update = true
# Create a git tag for each released version.
git_tag_enable = true
# Create a GitHub Release for each published version (this is the surface
# where the sigstore build-provenance attestation will be linked).
git_release_enable = true
git_release_type = "auto"

[changelog]
# Keep changelog headings simple and conventional-commit driven.
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
