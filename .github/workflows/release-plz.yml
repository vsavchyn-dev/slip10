name: Release-plz

# Trusted publishing to crates.io via OIDC.
# See RELEASING.md for the one-time crates.io UI setup the maintainer must
# perform before the first release through this workflow.

on:
  push:
    branches:
      - master

# Top-level permissions are intentionally minimal; per-job blocks below grant
# only what each job needs.
permissions: {}

jobs:
  # Opens / updates the "release PR" that bumps versions and updates the
  # changelog. Does not publish.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Newer pushes to the same ref make the in-flight release-PR run obsolete,
    # so cancelling is safe and avoids redundant work.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz (release-pr)
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publishes any unpublished package versions on master to crates.io and
  # creates the matching GitHub release. Authenticates to crates.io via
  # OIDC trusted publishing — no CARGO_REGISTRY_TOKEN secret is used.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      # Required for OIDC trusted publishing to crates.io. release-plz mints
      # a short-lived token from the OIDC token internally — see
      # https://release-plz.dev/docs/github/quickstart
      id-token: write
      # Required so actions/attest-build-provenance can write the
      # attestation back to the workflow run.
      attestations: write
    # Serialize publishes so two rapid pushes to master can't race on
    # `cargo publish` / tag creation. Never cancel an in-flight publish —
    # we'd rather wait than risk a half-published release.
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz (release)
        id: release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release
        env:
          # No CARGO_REGISTRY_TOKEN: release-plz uses OIDC trusted publishing
          # automatically when id-token: write is set on the job and no
          # CARGO_REGISTRY_TOKEN env var is present.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Best-effort sigstore build provenance attestation for the published
      # crate tarball. release-plz does not currently expose the path to the
      # .crate file it produced (see RELEASING.md "Follow-ups"), so we
      # re-package locally only when something was actually released and
      # attest that artifact. The published tarball is bit-for-bit
      # reproducible from the same commit, so the attestation still binds
      # the published artifact to this workflow run.
      - name: Re-package crate for attestation
        if: steps.release-plz.outputs.releases_created == 'true'
        run: cargo package --no-verify
      - name: Attest build provenance
        if: steps.release-plz.outputs.releases_created == 'true'
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: target/package/*.crate
